services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: debtdomino
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: DebtDomino.API/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Host=db;Port=5432;Database=debtdomino;Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-postgres}
      - Jwt__Secret=${JWT_SECRET:-CHANGE_ME_IN_PRODUCTION_USE_A_LONG_RANDOM_SECRET}
      - Jwt__Issuer=debtdomino
      - Jwt__Audience=debtdomino-users
      - Jwt__ExpiryMinutes=60
      - Frontend__Url=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
